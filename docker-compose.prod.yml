version: '3.8'

# ─────────────────────────────────────────────────────────────
# PRODUCTION-READY DOCKER COMPOSE
# Optimized for AWS Deployment
# Removes: Kafka, Zookeeper (replaced with AWS SQS)
# ─────────────────────────────────────────────────────────────

services:

  # ─────────────────────────────────────────────────────────────
  # INFRASTRUCTURE (For local development/testing)
  # In AWS, these are managed services
  # ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:14-alpine
    container_name: scrapninja-postgres
    restart: always
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - scapninja-network
    profiles:
      - local
      - dev

  redis:
    image: redis:7-alpine
    container_name: scrapninja-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - scapninja-network
    profiles:
      - local
      - dev

  # ─────────────────────────────────────────────────────────────
  # BACKEND MICROSERVICES
  # ─────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: scrapninja-auth
    restart: always
    environment:
      # Database
      DB_HOST: ${RDS_ENDPOINT:-postgres}
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      
      # AWS
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL:-}
      
      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      
      # App
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 8080
      APP_DEBUG: 'false'
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scapninja-network
    profiles:
      - local
      - dev
      - prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: scrapninja-api-gateway
    restart: always
    environment:
      # Database
      DB_HOST: ${RDS_ENDPOINT:-postgres}
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      
      # AWS
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-scrapninja-static}
      
      # Redis
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      
      # Services
      AUTH_SERVICE_URL: http://auth-service:8080
      ENQUIRY_SERVICE_URL: http://enquiry-service:8081
      PICKUP_SERVICE_URL: http://pickup-service:8082
      PRICING_SERVICE_URL: http://pricing-service:8083
      LOCATION_SERVICE_URL: http://location-service:8084
      VENDOR_SERVICE_URL: http://vendor-onboarding-service:8085
      
      # App
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: 9000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - scapninja-network
    profiles:
      - local
      - dev
      - prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  enquiry-service:
    build:
      context: ./backend/enquiry-service
      dockerfile: Dockerfile
    container_name: scrapninja-enquiry
    restart: always
    environment:
      DB_HOST: ${RDS_ENDPOINT:-postgres}
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL:-}
      APP_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scapninja-network
    profiles:
      - local
      - dev
      - prod

  pickup-service:
    build:
      context: ./backend/pickup-service
      dockerfile: Dockerfile
    container_name: scrapninja-pickup
    restart: always
    environment:
      DB_HOST: ${RDS_ENDPOINT:-postgres}
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL:-}
      APP_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scapninja-network
    profiles:
      - local
      - dev
      - prod

  location-service:
    build:
      context: ./backend/location-service
      dockerfile: Dockerfile
    container_name: scrapninja-location
    restart: always
    environment:
      DB_HOST: ${RDS_ENDPOINT:-postgres}
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL:-}
      APP_PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scapninja-network
    profiles:
      - local
      - dev
      - prod

  pricing-service:
    build:
      context: ./backend/pricing-service
      dockerfile: Dockerfile
    container_name: scrapninja-pricing
    restart: always
    environment:
      DB_HOST: ${RDS_ENDPOINT:-postgres}
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: admin
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: 6379
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL:-}
      APP_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scapninja-network
    profiles:
      - local
      - dev
      - prod

  # ─────────────────────────────────────────────────────────────
  # NGINX REVERSE PROXY (Local only)
  # In AWS, use ALB instead
  # ─────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: scrapninja-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api-gateway
    networks:
      - scapninja-network
    profiles:
      - local
      - dev

  # ─────────────────────────────────────────────────────────────
  # MONITORING & OBSERVABILITY (Optional)
  # ─────────────────────────────────────────────────────────────

  # Prometheus for metrics (optional, for local monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: scrapninja-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - scapninja-network
    profiles:
      - local
      - dev
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  scapninja-network:
    driver: bridge
