services:

  # ─────────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────────────────────

  postgres:
    image: postgres:14-alpine
    container_name: scapninja-postgres
    restart: always
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - scapninja-network

  redis:
    image: redis:7-alpine
    container_name: scapninja-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - scapninja-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: scapninja-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr,mntr"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -zw3 localhost 2181 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - scapninja-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: scapninja-kafka
    restart: always
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - scapninja-network

  # ─────────────────────────────────────────────────────────────
  # BACKEND MICROSERVICES
  # ─────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: backend/auth-service/Dockerfile
    container_name: scapninja-auth
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb?currentSchema=auth
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/actuator/health | grep -q UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - scapninja-network

  pickup-service:
    build:
      context: .
      dockerfile: backend/pickup-service/Dockerfile
    container_name: scapninja-pickup
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb?currentSchema=pickup
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_LISTENER_AUTO_STARTUP: "false"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/api/actuator/health | grep -q UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - scapninja-network

  pricing-service:
    build:
      context: .
      dockerfile: backend/pricing-service/Dockerfile
    container_name: scapninja-pricing
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb?currentSchema=pricing
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_LISTENER_AUTO_STARTUP: "false"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/api/actuator/health | grep -q UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - scapninja-network

  location-service:
    build:
      context: .
      dockerfile: backend/location-service/Dockerfile
    container_name: scapninja-location
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb?currentSchema=location
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/api/actuator/health | grep -q UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - scapninja-network

  enquiry-service:
    build:
      context: .
      dockerfile: backend/enquiry-service/Dockerfile
    container_name: scapninja-enquiry
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb?currentSchema=enquiry
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/api/leads/health | grep -q UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - scapninja-network

  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    container_name: scapninja-gateway
    restart: always
    depends_on:
      auth-service:
        condition: service_healthy
      pickup-service:
        condition: service_healthy
      pricing-service:
        condition: service_healthy
      location-service:
        condition: service_healthy
      enquiry-service:
        condition: service_healthy
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      PICKUP_SERVICE_URL: http://pickup-service:8082
      PRICING_SERVICE_URL: http://pricing-service:8083
      LOCATION_SERVICE_URL: http://location-service:8084
      ENQUIRY_SERVICE_URL: http://enquiry-service:8085
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - scapninja-network

  # ─────────────────────────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
    container_name: scapninja-frontend
    restart: always
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - scapninja-network

  # ─────────────────────────────────────────────────────────────
  # NGINX REVERSE PROXY
  # ─────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: scapninja-nginx
    restart: always
    depends_on:
      - frontend
      - api-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - scapninja-network

# ─────────────────────────────────────────────────────────────
# VOLUMES & NETWORKS
# ─────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:

networks:
  scapninja-network:
    driver: bridge
