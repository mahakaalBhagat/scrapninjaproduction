spring:
  application:
    name: vendor-onboarding-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  datasource:
    url: jdbc:mysql://localhost:3306/scrap_ninja_vendor_onboarding?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8087
  servlet:
    context-path: /api/vendor-onboarding

logging:
  level:
    root: INFO
    com.scrapninja: DEBUG

# File upload configuration
file-upload:
  max-file-size: 10485760 # 10MB
  allowed-types: application/pdf,image/jpeg,image/png,image/jpg,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
  upload-dir: /uploads/vendor-documents/

# Kafka configuration
spring.kafka:
  bootstrap-servers: localhost:9092
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  consumer:
    bootstrap-servers: localhost:9092
    group-id: vendor-onboarding-group
    key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    properties:
      spring:
        json:
          trusted:
            packages: "*"

jwt:
  secret: your_jwt_secret_key_here_change_in_production
  expiration: 86400000 # 24 hours
